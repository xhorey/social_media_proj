{% load static %}

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width,initial-scale=1">
    <title>Main Web Page</title>
    <link rel="stylesheet" href="{% static 'Styles/Main_Page.css'%}">
</head>
<body>
    <div class="header">
        {% csrf_token %}
        <div class="logo">
            <a href="home" ><img id="logo" src="{% static '/Assets/Logo.png'%}" alt= "Webpage Logo"></a>
        </div>
        <h1 id="MainHeader">Main Web Page</h1>
        <div class="profile-dropdown-container">
            <div class="add-post">
                <a class="post-btn" href="posting">
                    <button id="addPostButton">Post</button>
                </a>
            </div>
            <div class="profile-dropdown">
                <input type="checkbox" id="toggle-menu">

                <label for="toggle-menu">
                    <img id="pp" src="{{user_profile.profileimg.url}}" alt="Profile Icon">
                </label>

                <div class="dropdown-content">
                    <a class="dropdown-link" href="profile/{{user_profile.user.username}}">Profile</a>
                    <a class="dropdown-link" href="settings">Settings</a>
                    <a class="dropdown-link" href="logout">Logout</a>
                </div>
            </div>
        </div>
    </div>
    <div class="content">
        {% for post in posts %}
         <div class="posts">
            <div class="post_header">
                <a class="user_info" href="/profile/{{post.user}}">
                    <img id="pp" src="{{post.user.profile.profileimg.url}}" alt="Profile Icon">
                    <h2 class="username_over_post">{{post.user}}</h2>
                </a>
                <div class="post_time">
                    <p>10-05-2026</p>
                </div>
            </div>
            <div class="postImage">
                <img id="postImage" src="{{post.image.url}}" alt="Sample Post Image">
            </div>
            <div class="post-content">
                <p class="text-of-post">{{post.text_of_post}}</p>
            </div>
            <div class="post_interactions">
                <button class="like_button" data-post-id="{{ post.id }}">
                    👍 <span class="like-count">{{ post.no_of_likes }}</span>
                </button>
                <button class="dislike_button" data-post-id="{{ post.id }}">
                    👎 <span class="dislike-count">{{ post.no_of_dislikes }}</span>
                </button>
                <button class="comment_button">💬 0</button>
                <button class="repost_button">🔄 0</button>
            </div>
            <div class="Comments">
                <h2 id="comment_header">Comments</h2>
                <p>Comment 1</p>
                <p>Comment 2</p>
            </div>
        </div>
        {% endfor %}
    </div>
    <script src="{% static 'JS/like_dislike_fetch.js'%}"></script>
</body>
</html>
