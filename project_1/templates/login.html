{% load static %}

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width,initial-scale=1">
    <link rel="icon" type="image/png" href="{% static '/Assets/Mint_firstLogo.png'%}">
    <title>Sign in</title>
    <link rel="stylesheet" href="{% static '/Styles/Login.css' %}">
</head>
<body>
    <div class="header">
        <a href="signin" ><img id="logo" src="{% static '/Assets/Mint_firstLogo.png'%}" alt= "Webpage Logo"></a>
        <h1 id="MainHeader">Login</h1>
        <h1></h1>
    </div>
    <div class="login">
        
        <div>

            <style>
                h5{
                    color: red;
                }
            </style>

            {% for message in messages %}
            <h5>
                {{message}}
            </h5>
            {% endfor %}

        </div>

        <form class="form_signin" action="" method="POST">
            {% csrf_token %}
            <input class="input_field" type="text" id="username" placeholder="Username" name="username" required>
            <input class="input_field" type="password" id="password" placeholder="Password" name="password" required>
            <button id="loginButton" type="submit">Login</button>
            <a href="/signup" id="NewUser">You don't have an account? Sign up here!</a>
        </form>


    </div>
</body>
</html>
