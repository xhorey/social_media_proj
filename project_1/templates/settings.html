{% load static %}

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width,initial-scale=1">
    <link rel="icon" type="image/png" href="{% static '/Assets/Mint_firstLogo.png'%}">
    <title>Settings</title>
    <link rel="stylesheet" href="{% static '/Styles/Settings.css' %}">
    <link rel="stylesheet" href="{% static '/Styles/theme.css' %}">
</head>
<body>
    <div class="header">
        <a href="/home" ><img id="logo" src="{% static '/Assets/Mint_firstLogo.png'%}" alt= "Webpage Logo"></a>
        <h1 id="MainHeader">Settings</h1>
        <h1></h1>
    </div>
    <form action="" method="POST" enctype="multipart/form-data">
        {% csrf_token %}
        <div class="Settings">
            <img class="profilePicture" src="{{user_profile.profileimg.url}}" alt="Profile Picture">
            <input type="file" name="image" accept="image/*" id="selectImage" hidden>
            <div class="buttons_manage_icon">
                <button type="button" id="selectImageButton">
                    Add Image
                </button> 

                <button type="button" class="hidden" id="resetImageButton">
                    Reset
                </button>
            </div>
            <label class="bio_lbl">Bio</label> 
            <textarea class="bio" name="bio" placeholder="Bio">{{user_profile.bio}}</textarea>
            <label class="banner_lbl">Banner</label>
            <img id="bannerPicture" src="{{user_profile.banner.url}}" alt="Banner Picture">
            <input type="file" name="banner" accept="image/*" id="selectBanner" hidden> 
            <div class="buttons_manage_icon">
                <button type="button" id="selectBannerButton">
                    Add Banner
                </button> 

                <button type="button" class="hidden" id="resetBannerButton">
                    Reset
                </button>
            </div>

            <button type="submit" class="SettingsButton">Save Changes</button>
        </div>
    </form>
    <div class="button_container">
        <button type="button" id="dark_button">Dark theme</button>
    </div>
    <script src="{% static 'JS/settings_submit_fetch.js' %}"></script>
    <script src="{% static 'JS/settings_preview.js' %}"></script>
</body>
</html>
